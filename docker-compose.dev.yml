# Uso local apenas: sobe só a Evolution API + seu Postgres/Redis internos,
# pra testar contra o backend rodando no host (uvicorn --reload), sem
# container nenhum do backend/frontend aqui. O webhook aponta pro host via
# host.docker.internal — não precisa de túnel (ngrok/cloudflared) porque
# tudo roda na mesma máquina.

services:
  evolution-postgres:
    image: postgres:16-alpine
    container_name: evolution-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: ${EVOLUTION_POSTGRES_PASSWORD}
      POSTGRES_DB: evolution
    volumes:
      - evolution_postgres_dev_data:/var/lib/postgresql/data

  evolution-redis:
    image: redis:7-alpine
    container_name: evolution-redis-dev
    restart: unless-stopped
    volumes:
      - evolution_redis_dev_data:/data

  evolution-api:
    image: evoapicloud/evolution-api:v2.1.1
    container_name: evolution-api-dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - evolution-postgres
      - evolution-redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:${EVOLUTION_POSTGRES_PASSWORD}@evolution-postgres:5432/evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evolution-redis:6379
      CACHE_REDIS_PREFIX_KEY: evolution
      WEBHOOK_GLOBAL_URL: http://host.docker.internal:8000/api/v1/webhooks/evolution
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
    volumes:
      - evolution_instances_dev:/evolution/instances

volumes:
  evolution_postgres_dev_data:
  evolution_redis_dev_data:
  evolution_instances_dev:
